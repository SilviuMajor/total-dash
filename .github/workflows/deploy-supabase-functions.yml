name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: nznfznjlroycddegwvpt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          set -e
          cd supabase/functions
          for dir in */; do
            fn_name="${dir%/}"
            echo "::group::Deploying ${fn_name}"
            supabase functions deploy "${fn_name}" \
              --project-ref "${SUPABASE_PROJECT_REF}" \
              --no-verify-jwt || echo "::warning::Failed to deploy ${fn_name}"
            echo "::endgroup::"
          done
          echo "Deploy loop complete."
